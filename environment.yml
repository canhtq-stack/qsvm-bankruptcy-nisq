name: qsvm-bankruptcy-nisq
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10.12
  - pip
  - pip:
    # Core scientific stack
    - numpy==1.26.4
    - pandas==2.1.4
    - scipy==1.11.4
    - scikit-learn==1.3.2
    - imbalanced-learn==0.11.0

    # Gradient boosting
    - xgboost==2.0.3

    # Quantum computing
    - qiskit==0.45.1
    - qiskit-aer==0.13.3
    - qiskit-machine-learning==0.7.2
    - qiskit-ibm-runtime==0.17.0

    # Interpretability
    - shap==0.44.0

    # Statistics
    - statsmodels==0.14.1
    - pingouin==0.5.4

    # Visualization
    - matplotlib==3.8.2
    - seaborn==0.13.1

    # Utilities
    - joblib==1.3.2
    - tqdm==4.66.1
    - ipykernel==6.28.0
